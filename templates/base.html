<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEG | Secure Steganographic Communication</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="STEG: Premium Secure Steganographic Communication System. Encode and decode messages in images with high-level encryption and stealth.">
    <meta name="author" content="Antigravity">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS (Animation on Scroll) -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Favicon (Tab Logo) -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    
    <style>
        :root {
            --deep: #0B0E14;
            --neon: #00FFC2;
            --electric: #009DFF;
            --soft: #F8FAFC;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-primary: linear-gradient(135deg, var(--neon), var(--electric));
            --bg-blur: blur(15px);
        }
    </style>
</head>
<body class="bg-dark">
    <!-- Background Animation Layer -->
    <div class="glow-layer"></div>
    
    <!-- Navigation Bar -->
    <nav class="navbar" id="navbar">
        <div class="container navbar-container">
            <a href="/" class="navbar-brand">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="STEG Logo" class="brand-logo" style="border-radius: 50%; border: 2px solid var(--neon);">
                <span class="brand-text">STEG</span>
            </a>
            <ul class="navbar-nav">
                <li><a href="/" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/encode" class="nav-link"><i class="fas fa-plus-circle"></i> Encode</a></li>
                <li><a href="/dashboard" class="nav-link"><i class="fas fa-shield-alt"></i> Decode</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    {% for message in messages %}
                        Swal.fire({
                            icon: '{{ "success" if "Success" in message else "error" }}',
                            title: '{{ message }}',
                            background: '#0B0E14',
                            color: '#F8FAFC',
                            confirmButtonColor: '#00FFC2'
                        });
                    {% endfor %}
                });
            </script>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <p>&copy; 2026 STEG Secure. All rights reserved. <span class="accent-text">Encrypted Communication.</span></p>
                </div>
                <div class="footer-links">
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });

        // Global Password Toggle
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Navbar Scroll Effect
        window.addEventListener('scroll', function() {
            if (window.scrollY > 50) {
                document.getElementById('navbar').classList.add('scrolled');
            } else {
                document.getElementById('navbar').classList.remove('scrolled');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
